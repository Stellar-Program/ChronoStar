name: Test Contracts

on:
  push:
    branches: [main]
    paths:
      - 'contract/**'
  pull_request:
    paths:
      - 'contract/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - run: cargo test
        working-directory: contract
