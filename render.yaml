services:
  - type: web
    name: chronostar-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /healthz
    envVars:
      - key: VAULT_CONTRACT_ID
        sync: false
      - key: STREAM_CONTRACT_ID
        sync: false
      - key: DCA_CONTRACT_ID
        sync: false
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: Test SDF Network ; September 2015
      - key: PORT
        value: "3001"

  - type: worker
    name: chronostar-keeper
    env: node
    region: oregon
    plan: free
    buildCommand: cd keeper && npm install
    startCommand: cd keeper && npm start
    envVars:
      - key: KEEPER_SECRET
        sync: false
      - key: VAULT_CONTRACT_ID
        sync: false
      - key: STREAM_CONTRACT_ID
        sync: false
      - key: DCA_CONTRACT_ID
        sync: false
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: Test SDF Network ; September 2015
      - key: POLL_INTERVAL_MS
        value: "30000"
      - key: PORT
        value: "3002"
      - key: LOG_LEVEL
        value: info
      - key: RETRY_MAX_ATTEMPTS
        value: "5"
      - key: RETRY_BASE_DELAY_MS
        value: "1000"
